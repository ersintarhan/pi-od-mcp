name: publish

# Publishes to npm via Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Trigger: cut a GitHub Release (or run manually from Actions).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # must match the env configured on npm's trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run typecheck

      # provenance + access come from package.json publishConfig.
      # OIDC handshake needs no token; setup-node wires the registry.
      - run: npm publish
